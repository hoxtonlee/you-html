/* 背景（粉色） */

    font-family:"Microsoft JhengHei";
    background:linear-gradient(135deg,#ffc0cb,#ff69b4);
    color:white;
    text-align:center;
    padding:30px;
}

/* 標題 */
h1{
    font-size:34px;
    margin-bottom:20px;
}

/* 卡片排列 */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,200px);
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

/* 卡片按鈕 */
.card{
    background:white;
    color:#ff1493;
    padding:20px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    background:#ffe4ec;
}

/* 移除底線 */
a{
    text-decoration:none;
}

/* 金額區 */
.price{
    margin-top:50px;
    font-size:20px;
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}

/* 備註 */
.note{
    margin-top:10px;
    color:yellow;
    font-size:18px;
}

</style>

</head>
