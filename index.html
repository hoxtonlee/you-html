<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>丐幫轉盤</title>

<style>
@media (max-width:700px){

.menu{
    flex-direction:column;
    align-items:center;
}

}
/* 背景（粉色） */
body{
    font-family:"Microsoft JhengHei";

    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.45), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.25), transparent 25%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,0.2), transparent 30%),
        linear-gradient(
            135deg,
            #ffc0cb,
            #ff69b4,
            #ff85a2
        );

    color:white;

    text-align:center;

    padding:30px;

    letter-spacing:1px;

    min-height:100vh;
}
/* 標題 */
h1{
    font-size:34px;
    margin-bottom:20px;
    position:relative;
    display:inline-block;
    padding-bottom:12px;
    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px rgba(255,255,255,0.4);
}
h1::after{
    content:"";
    display:block;
    width:70%;
    height:4px;
    margin:10px auto 0;
    border-radius:999px;
    background:rgba(255,255,255,0.65);
    text-shadow: 0 0 12px rgba(255,255,255,0.6);
}
/* 卡片排列 */
.menu{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
    align-items:flex-start;
}

.column{
    display:flex;
    flex-direction:column;
    gap:20px;
}
/* 卡片按鈕 */
.card{

    /* 玻璃粉色感 */
    background:linear-gradient(
        145deg,
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.18)
    );

    /* 深玫瑰文字（推薦色） */
    color:#7a1e48;

    padding:22px;

    border-radius:22px;

    font-size:20px;
    font-weight:bold;

    width:220px;

    transition:0.25s;

    /* 立體陰影 */
    box-shadow:
        0 12px 28px rgba(0,0,0,0.18);

    /* 玻璃邊框 */
    border:2px solid rgba(255,255,255,0.45);

    /* 玻璃模糊 */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    /* 柔光邊 */
    outline:1px solid rgba(255,255,255,0.25);

    /* 文字更清楚 */
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

.card:hover{

    background:linear-gradient(
        145deg,
        rgba(255,255,255,0.6),
        rgba(255,255,255,0.25)
    );

    transform:
        translateY(-6px)
        scale(1.04);

    box-shadow:
        0 20px 40px rgba(0,0,0,0.28);
}

/* 移除底線 */
a{
    text-decoration:none;
}

/* 金額區 */
.price{
    margin-top:50px;
    font-size:20px;
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}

/* 備註 */
.note{
    margin-top:10px;
    color:yellow;
    font-size:18px;
}

</style>

</head>

<body>
