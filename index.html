<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>丐幫轉盤</title>

<style>

/* 背景（粉色） */
body{
    font-family:"Microsoft JhengHei";
    background:linear-gradient(135deg,#ffc0cb,#ff69b4);
    color:white;
    text-align:center;
    padding:30px;
}

/* 標題 */
h1{
    font-size:34px;
    margin-bottom:20px;
}

/* 卡片排列 */
.menu{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
    align-items:flex-start;
}

.column{
    display:flex;
    flex-direction:column;
    gap:20px;
}
/* 卡片按鈕 */
.card{
    background:#ffe4ec;
    color:#ff1493;
    padding:20px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    transition:0.2s;
}

.card:hover{
    background:#ffd6e7;   /* 滑鼠碰到變色 */
}

/* 移除底線 */
a{
    text-decoration:none;
}

/* 金額區 */
.price{
    margin-top:50px;
    font-size:20px;
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}

/* 備註 */
.note{
    margin-top:10px;
    color:yellow;
    font-size:18px;
}

</style>

</head>

<body>

    </div>

    <div class="column">
