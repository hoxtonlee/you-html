<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>丐幫轉盤</title>

<style>
@media (max-width:700px){

.menu{
    flex-direction:column;
    align-items:center;
}

}
/* 背景（粉色） */
body{
    font-family:"Microsoft JhengHei";
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 25%),
        radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 20%),
        linear-gradient(135deg,#ffc0cb,#ff69b4);
    color:white;
    text-align:center;
    padding:30px;
    letter-spacing:1px;
}

/* 標題 */
h1{
    font-size:34px;
    margin-bottom:20px;
    position:relative;
    display:inline-block;
    padding-bottom:12px;
}
h1::after{
    content:"";
    display:block;
    width:70%;
    height:4px;
    margin:10px auto 0;
    border-radius:999px;
    background:rgba(255,255,255,0.65);
    text-shadow: 0 0 12px rgba(255,255,255,0.6);
}
/* 卡片排列 */
.menu{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
    align-items:flex-start;
}

.column{
    display:flex;
    flex-direction:column;
    gap:20px;
}
/* 卡片按鈕 */
.card{
    background:rgba(255,255,255,0.22);
    color:white;
    padding:22px;
    border-radius:20px;
    font-size:20px;
    font-weight:bold;
    width:220px;
    transition:0.25s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    border:2px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    outline:1px solid rgba(255,255,255,0.3);
    text-shadow: 0 2px 4px rgba(0,0,0,0.25);
}

.card:hover{
    background:rgba(255,255,255,0.30);
    transform:translateY(-5px) scale(1.03);
    box-shadow: 0 18px 35px rgba(0,0,0,0.25);
}

/* 移除底線 */
a{
    text-decoration:none;
}

/* 金額區 */
.price{
    margin-top:50px;
    font-size:20px;
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}

/* 備註 */
.note{
    margin-top:10px;
    color:yellow;
    font-size:18px;
}

</style>

</head>

<body>

<h1>🏮 丐幫轉盤 🏮</h1>
    
<div class="menu">

    <div class="column">
        <a href="【小紅】轉盤.html">

            </div>
        </a>

        <a href="【小紅】轉盤 Plus.html">

                <div style="font-size:18px; font-weight:bold;">2999$</div>
            </div>
        </a>
    </div>

    <div class="column">
        <a href="【狂賭之淵】轉盤.html">
            <div class="card">
                【狂賭之淵】轉盤

                <div style="font-size:18px; font-weight:bold;">1600$</div>
            </div>
        </a>

        <a href="【隨機哈夫幣】轉盤.html">

                <div style="font-size:16px; margin-top:8px;">轉到多少打多少!</div>
                <div style="font-size:18px; font-weight:bold;">1000$</div>
            </div>
        </a>
    </div>

    <div class="column">
        <a href="【資本家轉轉盤】天命難為轉盤.html">
            <div class="card">
                【資本家轉轉盤】天命難為轉盤
                <div style="font-size:16px; margin-top:8px;">累積消費2000$</div>
            </div>
        </a>

        <a href="【資本家轉轉盤】Bonus大轉盤.html">
            <div class="card">
                【資本家轉轉盤】Bonus大轉盤
                <div style="font-size:16px; margin-top:8px;">天命難為頭獎</div>

        <a href="【資本家轉轉盤】資本家大轉盤.html">

</div>
